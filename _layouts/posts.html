---
layout: default
---
<style>
  /* POST LAYOUT CONTAINER */
  .post-content {
    max-width: 740px;
    width: 100%;
    margin: 0 auto;
    padding: 3rem 1.5rem 6rem 1.5rem;
    box-sizing: border-box;
  }

  /* GLOBAL DEFAULT BLOG IMAGE CONSTRAINTS */
  .post-content img {
    max-width: 550px !important;
    width: 100%;
    height: auto !important;
    display: block;        
    margin: 2.5rem auto !important;
    border-radius: 6px;    
    border: 1px solid var(--rule); 
  }

  /* GITHUB STYLE MINIMAL CODE BLOCKS */
  .post-content pre, 
  .post-content .highlight {
    background-color: #f6f8fa !important;  /* GitHub's exact light-gray */
    border: 1px solid #d0d7de !important;   /* GitHub's subtle gray border */
    border-radius: 6px !important;
    padding: 16px !important;
    margin: 1.5rem 0 !important;
    overflow-x: auto !important;           
  }

  /* Code font stack matching GitHub */
  .post-content code {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace !important;
    font-size: 14px !important;
    line-height: 1.45 !important;
    color: #24292f !important;             
  }

  /* Inline code highlighting inside standard text paragraph lines */
  .post-content p code, 
  .post-content li code {
    background-color: rgba(175, 184, 193, 0.2) !important;
    padding: 0.2em 0.4em !important;
    font-size: 85% !important;
    border-radius: 6px !important;
    color: #24292f !important;
  }

  /* ==========================================================================
     SELF-CONTAINED GITHUB LIGHT SYNTAX COLORS (ROUGE HIGHLIGHTING TOKENS)
     ========================================================================== */
  .post-content .highlight .k,  /* Keywords: import, from, def */
  .post-content .highlight .kn { color: #cf222e !important; font-weight: 600 !important; } 
  
  .post-content .highlight .nn, /* Module Names: np, sklearn, datasets */
  .post-content .highlight .nc { color: #953800 !important; } 
  
  .post-content .highlight .s,  /* Strings: 'bwr', 'Scatter Plot...' */
  .post-content .highlight .s1,
  .post-content .highlight .s2 { color: #0a3069 !important; } 
  
  .post-content .highlight .c1, /* Comments: # Generate a dataset and plot it */
  .post-content .highlight .c { color: #6e7781 !important; font-style: italic !important; } 
  
  .post-content .highlight .m,  /* Numbers: 800, 0.20, 0.30 */
  .post-content .highlight .mi,
  .post-content .highlight .mf { color: #0550ae !important; } 
  
  .post-content .highlight .nb { color: #953800 !important; } /* Built-ins */
  .post-content .highlight .o { color: #bc4c00 !important; }  /* Operators (=, :) */

  /* TYPOGRAPHY */
  .post-content p { font-size: 1.15rem; line-height: 1.8; margin-bottom: 1.8rem; color: var(--ink); }
  .post-content h1, .post-content h2, .post-content h3 { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 600; margin-top: 3rem; margin-bottom: 1rem; }
  .post-content h1 { font-size: 2.4rem; }
  .post-content h2 { font-size: 1.9rem; }
</style>

<div class="post-content">
  <div class="back-btn-container">
    <a href="/" class="back-btn">← Back to Portfolio</a>
  </div>

  {{ content }}
</div>
