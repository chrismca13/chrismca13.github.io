---
layout: default
---
<style>
  /* POST LAYOUT CONTAINER */
  .post-content {
    max-width: 740px;      /* Golden standard for readable text line lengths */
    width: 100%;
    margin: 0 auto;        /* Centers the article column on the screen */
    padding: 3rem 1.5rem 6rem 1.5rem; /* Breathing room */
    box-sizing: border-box;
  }

  /* GLOBAL DEFAULT BLOG IMAGE CONSTRAINTS */
  .post-content img {
    max-width: 550px !important; /* Scaled down default maximum width (instead of a massive 740px) */
    width: 100%;                 /* Fluid on mobile */
    height: auto !important;     /* Maintains correct aspect ratio */
    display: block;        
    margin: 2.5rem auto !important; /* Centers and adds vertical breathing room */
    border-radius: 6px;    
    border: 1px solid var(--rule); 
  }

  /* IMAGE UTILITY CLASSES (Use these in Markdown to make specific images smaller) */
  .post-content img.img-small {
    max-width: 350px !important;
  }

  .post-content img.img-medium {
    max-width: 480px !important;
  }

  .post-content img.img-large {
    max-width: 100% !important; /* Expands to full 740px column width if needed */
  }

  /* Style image captions (written as *Italics* directly underneath an image) */
  .post-content img + em {
    display: block;
    text-align: center;
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--ink-muted);
    margin-top: -1.5rem;
    margin-bottom: 2.5rem;
  }

  /* TYPOGRAPHY ADJUSTMENTS FOR READABILITY */
  .post-content p {
    font-size: 1.15rem;     
    line-height: 1.8;       
    margin-bottom: 1.8rem;
    color: var(--ink);
  }

  .post-content h1, 
  .post-content h2, 
  .post-content h3 {
    font-family: var(--news);
    font-weight: 300;
    margin-top: 3rem;
    margin-bottom: 1rem;
    line-height: 1.25;
  }

  .post-content h1 { font-size: 2.4rem; }
  .post-content h2 { font-size: 1.9rem; }
</style>

<div class="post-content">
  <div class="back-btn-container">
    <a href="/" class="back-btn">← Back to Portfolio</a>
  </div>

  {{ content }}
</div>
