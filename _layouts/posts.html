---
layout: default
---
<style>
  /* POST LAYOUT CONTAINER */
  .post-content {
    max-width: 740px;
    width: 100%;
    margin: 0 auto;
    padding: 3rem 1.5rem 6rem 1.5rem;
  }

  /* GLOBAL DEFAULT BLOG IMAGE CONSTRAINTS */
  .post-content img {
    max-width: 550px !important;
    width: 100%;
    height: auto !important;
    display: block;        
    margin: 2.5rem auto !important;
    border-radius: 6px;    
    border: 1px solid var(--rule); 
  }

  /* GITHUB-STYLE CODE BLOCK WRAPPER & CONTRAST */
  .post-code-wrapper {
    position: relative;
    margin: 1.5rem 0 !important;
    border: 1px solid #d0d7de !important;
    border-radius: 6px !important;
    background-color: #f6f8fa !important; /* Force GitHub light-mode gray background */
    overflow: hidden;
    width: 100%;
  }

  /* Strip Jekyll's default highlighter boxes down so our wrapper handles the look */
  .post-content [class^="language-"],
  .post-content .highlighter-rouge,
  .post-content .highlight,
  .post-content pre {
    background: transparent !important;
    background-color: transparent !important;
    border: none !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  /* Apply the actual padding and scrolling to the pre tag inside the wrapper */
  .post-code-wrapper pre {
    padding: 16px !important;
    overflow-x: auto !important;
    display: block !important;
    margin: 0 !important;
  }

  .post-content code {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace !important;
    font-size: 14px !important;
    line-height: 1.45 !important;
    color: #24292f !important; /* Force deep high-contrast text color */
  }

  /* Inline code highlighting inside paragraphs */
  .post-content p code, 
  .post-content li code {
    background-color: rgba(175, 184, 193, 0.2) !important;
    padding: 0.2em 0.4em !important;
    font-size: 85% !important;
    border-radius: 6px !important;
    color: #24292f !important;
  }

  /* GITHUB-STYLE COPY BUTTON */
  .code-copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    background-color: #f6f8fa;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    cursor: pointer;
    opacity: 0; /* Hidden until hovered */
    transition: opacity 0.2s ease, background-color 0.1s ease;
    z-index: 10;
    padding: 0;
  }

  /* Show button when hovering over the code wrapper block */
  .post-code-wrapper:hover .code-copy-btn {
    opacity: 1;
  }

  .code-copy-btn:hover {
    background-color: #f3f4f6;
    border-color: #8c959f;
  }

  .code-copy-btn svg {
    width: 14px;
    height: 14px;
    fill: #57606a;
  }

  /* Copied Success State popup */
  .code-copy-btn.copied::before {
    content: "Copied!";
    position: absolute;
    left: -60px;
    top: 2px;
    background: #24292f;
    color: #fff;
    font-size: 11px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 3px 6px;
    border-radius: 4px;
    pointer-events: none;
  }

  /* TYPOGRAPHY ADJUSTMENTS */
  .post-content p { font-size: 1.15rem; line-height: 1.8; margin-bottom: 1.8rem; color: var(--ink); }
  .post-content h1, .post-content h2, .post-content h3 { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 600; margin-top: 3rem; margin-bottom: 1rem; }
  .post-content h1 { font-size: 2.4rem; }
  .post-content h2 { font-size: 1.9rem; }
</style>

<div class="post-content">
  <div class="back-btn-container">
    <a href="/" class="back-btn">← Back to Portfolio</a>
  </div>

  {{ content }}
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    // Target the outermost wrapper Jekyll can possibly create for code blocks
    const highlighters = document.querySelectorAll('.post-content [class^="language-"], .post-content .highlighter-rouge, .post-content pre');

    highlighters.forEach((block) => {
      // Find the absolute inner pre element where the code lives
      const preTag = block.tagName === "PRE" ? block : block.querySelector("pre");
      if (!preTag || preTag.dataset.processed) return; // Prevent double-wrapping bugs

      // Mark as processed immediately
      preTag.dataset.processed = "true";

      // 1. Create container wrapper
      const wrapper = document.createElement("div");
      wrapper.className = "post-code-wrapper";

      // 2. Create copy button element
      const button = document.createElement("button");
      button.className = "code-copy-btn";
      button.setAttribute("aria-label", "Copy code to clipboard");
      button.innerHTML = `
        <svg viewBox="0 0 16 16">
          <path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"></path>
          <path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"></path>
        </svg>
      `;

      // 3. Re-arrange DOM structure safely
      block.parentNode.insertBefore(wrapper, block);
      wrapper.appendChild(preTag); // Pulls only the clean pre block inside our styled box
      wrapper.appendChild(button);

      // Clean up empty outer containers left over by Jekyll if applicable
      if (block !== preTag && block.childNodes.length === 0) {
        block.remove();
      }

      // 4. Copy Event Handler
      button.addEventListener("click", function () {
        const codeText = preTag.querySelector("code")?.innerText || preTag.innerText;

        navigator.clipboard.writeText(codeText).then(() => {
          button.classList.add("copied");
          setTimeout(() => button.classList.remove("copied"), 2000);
        }).catch((err) => {
          console.error("Failed to copy code: ", err);
        });
      });
    });
  });
</script>
