---
layout: default
---
<style>
  /* POST LAYOUT CONTAINER */
  .post-content {
    max-width: 740px;      /* Golden standard for readable text line lengths */
    width: 100%;
    margin: 0 auto;        /* Centers the article column on the screen */
    padding: 3rem 1.5rem 6rem 1.5rem; /* Breathing room */
    box-sizing: border-box;
  }

  /* GLOBAL DEFAULT BLOG IMAGE CONSTRAINTS */
  .post-content img {
    max-width: 550px !important; /* Scaled down default maximum width */
    width: 100%;                 /* Fluid on mobile */
    height: auto !important;     /* Maintains correct aspect ratio */
    display: block;        
    margin: 2.5rem auto !important; /* Centers and adds vertical breathing room */
    border-radius: 6px;    
    border: 1px solid var(--rule); 
  }

  /* IMAGE UTILITY CLASSES */
  .post-content img.img-small {
    max-width: 350px !important;
  }

  .post-content img.img-medium {
    max-width: 480px !important;
  }

  .post-content img.img-large {
    max-width: 100% !important; /* Expands to full 740px column width if needed */
  }

  /* Style image captions */
  .post-content img + em {
    display: block;
    text-align: center;
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--ink-muted);
    margin-top: -1.5rem;
    margin-bottom: 2.5rem;
  }

  /* GITHUB-STYLE CODE BLOCKS */
  .post-content pre {
    background-color: #f6f8fa !important;  /* GitHub's light-mode code background */
    border: 1px solid #d0d7de !important;   /* GitHub's light-mode code border */
    border-radius: 6px !important;          /* Rounded corners */
    padding: 16px !important;               /* Inner spacing */
    overflow-x: auto !important;            /* Responsive horizontal scroll */
    margin-bottom: 1.5rem !important;       /* Space below block */
    font-size: 14.5px !important;           /* Readable font scale */
    line-height: 1.45 !important;           /* Comfortable line spacing */
  }

  /* Code font stack matching GitHub */
  .post-content code {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace !important;
    font-size: 85% !important;
  }

  /* Inline code highlighting (e.g. `code` inside paragraphs) */
  .post-content p code, 
  .post-content li code {
    background-color: rgba(175, 184, 193, 0.2) !important; /* Translucent grey background */
    padding: 0.2em 0.4em !important;
    margin: 0 !important;
    font-size: 85% !important;
    border-radius: 6px !important;
  }

  /* TYPOGRAPHY ADJUSTMENTS FOR READABILITY */
  .post-content p {
    font-size: 1.15rem;     
    line-height: 1.8;       
    margin-bottom: 1.8rem;
    color: var(--ink);
  }

  .post-content h1, 
  .post-content h2, 
  .post-content h3 {
    font-family: var(--news);
    font-weight: 300;
    margin-top: 3rem;
    margin-bottom: 1rem;
    line-height: 1.25;
  }

  .post-content h1 { font-size: 2.4rem; }
  .post-content h2 { font-size: 1.9rem; }
</style>

<div class="post-content">
  <div class="back-btn-container">
    <a href="/" class="back-btn">← Back to Portfolio</a>
  </div>

  {{ content }}
</div>
