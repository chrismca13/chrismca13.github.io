---
layout: default
---
<style>
  /* POST LAYOUT CONTAINER */
  .post-content {
    max-width: 740px;
    width: 100%;
    margin: 0 auto;
    padding: 3rem 1.5rem 6rem 1.5rem;
    box-sizing: border-box;
  }

  /* GLOBAL DEFAULT BLOG IMAGE CONSTRAINTS */
  .post-content img {
    max-width: 550px !important;
    width: 100%;
    height: auto !important;
    display: block;        
    margin: 2.5rem auto !important;
    border-radius: 6px;    
    border: 1px solid var(--rule); 
  }

  /* GITHUB STYLE MINIMAL CODE BLOCKS */
  .post-content pre, 
  .post-content .highlight {
    background-color: #f6f8fa !important;  /* GitHub's exact light-gray */
    border: 1px solid #d0d7de !important;   /* GitHub's subtle gray border */
    border-radius: 6px !important;
    padding: 16px !important;
    margin: 1.5rem 0 !important;
    overflow-x: auto !important;           /* Allows horizontal scrolling */
  }

  /* Code font stack matching GitHub */
  .post-content code {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace !important;
    font-size: 14px !important;
    line-height: 1.45 !important;
    color: #24292f !important;             /* Base code text color */
  }

  /* Inline code highlighting inside standard text paragraph lines */
  .post-content p code, 
  .post-content li code {
    background-color: rgba(175, 184, 193, 0.2) !important;
    padding: 0.2em 0.4em !important;
    font-size: 85% !important;
    border-radius: 6px !important;
    color: #24292f !important;
  }

  /* TYPOGRAPHY */
  .post-content p { font-size: 1.15rem; line-height: 1.8; margin-bottom: 1.8rem; color: var(--ink); }
  .post-content h1, .post-content h2, .post-content h3 { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 600; margin-top: 3rem; margin-bottom: 1rem; }
  .post-content h1 { font-size: 2.4rem; }
  .post-content h2 { font-size: 1.9rem; }
</style>

<div class="post-content">
  <div class="back-btn-container">
    <a href="/" class="back-btn">← Back to Portfolio</a>
  </div>

  {{ content }}
</div>
