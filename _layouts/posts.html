---
layout: default
---
<link rel="stylesheet" href="[https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css](https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css)">

<style>
  /* Target the exact wrapper Jekyll outputs for code blocks */
  div.highlighter-rouge,
  figure.highlight,
  pre.highlight {
    background-color: #f6f8fa !important;
    border: 1px solid #d0d7de !important;
    border-radius: 6px !important;
    padding: 16px !important;
    margin: 1.5rem 0 !important;
    display: block !important;
  }

  /* Force the text inside to look like modern code */
  div.highlighter-rouge pre,
  div.highlighter-rouge code {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace !important;
    font-size: 14px !important;
    line-height: 1.45 !important;
    color: #24292f !important;
    background: transparent !important;
  }
</style>

<div style="max-width: 740px; margin: 0 auto; padding: 2rem 1rem;">
  <a href="/">&larr; Back</a>
  
  {{ content }}
</div>

<script src="[https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js](https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js)"></script>
<script src="[https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js](https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js)"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll('pre').forEach((el) => {
      hljs.highlightElement(el);
    });
  });
</script>
