---
layout: default
---
<style>
  /* POST LAYOUT CONTAINER */
  .post-content {
    max-width: 740px;      /* The golden standard for readable text line lengths and bounded images */
    margin: 0 auto;        /* Centers the article column on the screen */
    padding: 3rem 1.5rem 6rem 1.5rem; /* Generous breathing room on top, bottom, and mobile sides */
  }

  /* GLOBAL BLOG IMAGE CONSTRAINTS */
  .post-content img {
    max-width: 100%;       /* Keeps the image bound strictly to your 740px reading column */
    height: auto;          /* Prevents stretching or distortion */
    display: block;        
    margin: 3rem auto;     /* Adds generous vertical space to let the images breathe */
    border-radius: 6px;    /* Subtle rounded edges */
    border: 1px solid var(--rule); /* Soft border to frame light screenshots against your background */
  }

  /* Style image captions (written as *Italics* directly underneath an image) */
  .post-content img + em {
    display: block;
    text-align: center;
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--ink-muted);
    margin-top: -2rem;
    margin-bottom: 3rem;
  }

  /* TYPOGRAPHY ADJUSTMENTS FOR READABILITY */
  .post-content p {
    font-size: 1.15rem;     /* Slightly larger font for long-form reading */
    line-height: 1.8;       /* Relaxed spacing so text is easy on the eyes */
    margin-bottom: 1.8rem;
    color: var(--ink);
  }

  .post-content h1, 
  .post-content h2, 
  .post-content h3 {
    font-family: var(--news);
    font-weight: 300;
    margin-top: 3rem;
    margin-bottom: 1rem;
    line-height: 1.25;
  }

  .post-content h1 { font-size: 2.4rem; }
  .post-content h2 { font-size: 1.9rem; }
</style>

<div class="post-content">
  <div class="back-btn-container">
    <a href="/" class="back-btn">← Back to Portfolio</a>
  </div>

  {{ content }}
</div>
